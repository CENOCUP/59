<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CenoCup v44 - Safe Mode</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@400;700&display=swap');

        :root {
            --ucl-blue: #001035;
            --ucl-gold: #c3a361;
            --danger: #ff4b2b;
        }

        body {
            background: var(--ucl-blue);
            color: #fff; font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1200px; }
        
        /* Botão Admin Visível para Teste */
        .admin-trigger {
            background: transparent; border: 1px solid var(--ucl-gold);
            color: var(--ucl-gold); padding: 5px 15px; cursor: pointer;
            margin-bottom: 20px; font-family: 'Orbitron'; font-size: 0.7rem;
        }

        #admin-panel { 
            display: none; background: #000; padding: 20px; 
            border: 2px solid var(--ucl-gold); margin-bottom: 20px; 
        }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(255,255,255,0.1); color: #fff;
            padding: 10px; border: 1px solid var(--ucl-gold); cursor: pointer;
        }
        .tab-btn.active { background: var(--ucl-gold); color: #000; }

        .table-wrapper { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 5px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { color: var(--ucl-gold); border-bottom: 2px solid var(--ucl-gold); padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .edit-row { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; background: #111; padding: 10px; }
        input { background: #222; color: #fff; border: 1px solid #444; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="font-family: 'Orbitron';">CENOCUP <span style="color:var(--ucl-gold)">V44</span></h1>
        <button class="admin-trigger" onclick="toggleAdmin()">ACESSO ADMIN (SENHA: 123)</button>
    </header>

    <div id="admin-panel">
        <h3 style="color:var(--ucl-gold)">PAINEL DE CONTROLO</h3>
        <div style="margin-bottom: 15px;">
            <button onclick="exportDB()">💾 EXPORTAR BACKUP</button>
            <button onclick="importDB()">📂 IMPORTAR BACKUP</button>
        </div>
        <div id="editor-content"></div>
        <button onclick="addNewPlayer()" style="width:100%; margin: 10px 0;">+ ADICIONAR TÉCNICO</button>
        <button onclick="saveAll()" style="width:100%; background:var(--ucl-gold); font-weight:bold; padding:10px;">SALVAR TUDO E RECARREGAR</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tabela')">TABELA</button>
        <button class="tab-btn" onclick="switchTab('ranking')">RANKING GERAL</button>
    </div>

    <div id="view-tabela" class="view">
        <div class="table-wrapper"><table id="table-main"></table></div>
    </div>

    <div id="view-ranking" class="view" style="display:none">
        <div class="table-wrapper"><table id="table-ranking"></table></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'cenocup_v44_final';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { atual: [], historico: [] };

    function toggleAdmin() {
        if(prompt("Senha:") === '123') {
            document.getElementById('admin-panel').style.display = 'block';
            renderEditor();
        }
    }

    function switchTab(mode) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + mode).style.display = 'block';
        event.target.classList.add('active');
        if(mode === 'ranking') renderRanking(); else renderTabela();
    }

    function renderTabela() {
        let list = [...db.atual].sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e));
        document.getElementById('table-main').innerHTML = `
            <thead><tr><th>Técnico</th><th>PTS</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GS</th></tr></thead>
            <tbody>${list.map(j => `<tr><td>${j.tecnico}</td><td>${(j.v*3)+j.e}</td><td>${j.v}</td><td>${j.e}</td><td>${j.d||0}</td><td>${j.gp}</td><td>${j.gc}</td></tr>`).join('')}</tbody>`;
    }

    function renderRanking() {
        let s = {};
        const proc = (l) => l.forEach(j => {
            if(!s[j.tecnico]) s[j.tecnico] = { t:j.tecnico, pts:0, j:0 };
            s[j.tecnico].pts += (j.v*3)+j.e;
            s[j.tecnico].j += (j.v+j.e+(j.d||0));
        });
        db.historico.forEach(h => proc(h.dados)); proc(db.atual);
        let sorted = Object.values(s).sort((a,b) => b.pts - a.pts);
        document.getElementById('table-ranking').innerHTML = `
            <thead><tr><th>Pos</th><th>Técnico</th><th>Jogos</th><th>Pts Totais</th></tr></thead>
            <tbody>${sorted.map((j, i) => `<tr><td>${i+1}º</td><td>${j.t}</td><td>${j.j}</td><td>${j.pts}</td></tr>`).join('')}</tbody>`;
    }

    function renderEditor() {
        document.getElementById('editor-content').innerHTML = db.atual.map((j, i) => `
            <div class="edit-row">
                <input type="text" value="${j.tecnico}" onchange="db.atual[${i}].tecnico=this.value">
                V:<input type="number" value="${j.v}" onchange="db.atual[${i}].v=parseInt(this.value)" style="width:40px">
                E:<input type="number" value="${j.e}" onchange="db.atual[${i}].e=parseInt(this.value)" style="width:40px">
                D:<input type="number" value="${j.d||0}" onchange="db.atual[${i}].d=parseInt(this.value)" style="width:40px">
                GP:<input type="number" value="${j.gp}" onchange="db.atual[${i}].gp=parseInt(this.value)" style="width:40px">
                GS:<input type="number" value="${j.gc}" onchange="db.atual[${i}].gc=parseInt(this.value)" style="width:40px">
            </div>`).join('');
    }

    function addNewPlayer() { db.atual.push({tecnico:"Novo", v:0, e:0, d:0, gp:0, gc:0}); renderEditor(); }
    function saveAll() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); location.reload(); }

    function exportDB() {
        const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = "cenocup_backup.json"; a.click();
    }

    function importDB() {
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { db = JSON.parse(ev.target.result); saveAll(); };
            reader.readAsText(e.target.files[0]);
        };
        inp.click();
    }

    renderTabela();
</script>
</body>
</html>
